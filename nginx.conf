events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limiting para endpoints de autenticación.
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # Rate limiting general.
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    # Rate limiting para subida de archivos.
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

    server {
        listen 80;
        server_name _;

        # Max upload size (25MB para Base64 overhead)
        client_max_body_size 25M;

        # Cabeceras de seguridad HTTP.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; script-src 'self' 'unsafe-inline' 'unsafe-eval' accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https:;" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Evitar redirección de 404 para archivos estáticos en assets.
        location /assets/ {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Endpoints de autenticación con rate limiting estricto.
        location ~ ^/api/v1/usuarios/(login|register|login-google)$ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Endpoint de subida de archivos con rate limiting.
        location /api/v1/archivos/upload {
            limit_req zone=upload burst=5 nodelay;
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Soporte SPA.
            proxy_intercept_errors on;
            error_page 404 =200 /;

            # WebSocket support.
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            # Timeouts.
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Compatibilidad con mensajes viejos con prefijo hardcodeado.
        location /chat-empresarial/ {
            rewrite ^/chat-empresarial/(.*) /$1 break;
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}
