events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name _;

        # Max upload size (25MB to allow Base64 overhead)
        client_max_body_size 25M;

        location / {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Soporte SPA: Si WildFly da 404, Nginx sirve el index
            proxy_intercept_errors on;
            error_page 404 =200 /;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            # Timeouts generosos para evitar el error de 10s
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Compatibilidad con mensajes viejos que tienen el prefijo hardcodeado
        location /chat-empresarial/ {
            rewrite ^/chat-empresarial/(.*) /$1 break;
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}
