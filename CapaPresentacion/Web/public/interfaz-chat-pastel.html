<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat — Interfaz pastel (Vuetify)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/vuetify@3.4.0/dist/vuetify.min.css"
      rel="stylesheet"
    />
    <style>
      /* Referencia mockup: “Page Headings 14” — títulos de cabecera ~14px */
      .heading-14 {
        font-size: 14px !important;
        font-weight: 500;
        line-height: 1.3;
        letter-spacing: 0.01em;
        color: rgb(var(--v-theme-accent));
      }
      /* Referencia mockup: “Buttons 11” — botones compactos ~11px */
      .btn-11 {
        font-size: 11px !important;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: none;
        min-height: 36px !important;
      }
      .chat-shell {
        border: 2px solid rgba(64, 109, 115, 0.35);
        border-radius: 12px;
        overflow: hidden;
        max-width: 1200px;
        margin: 0 auto;
      }
      .messages-scroll {
        max-height: min(52vh, 420px);
        overflow-y: auto;
        background: rgba(179, 235, 242, 0.35);
      }
      .bubble {
        border-radius: 14px;
        padding: 10px 14px;
        max-width: 78%;
        font-size: 14px;
        line-height: 1.45;
      }
      .bubble-them {
        background: #b2c5c8;
        color: #2f4a4f;
        align-self: flex-start;
      }
      .bubble-me {
        background: rgba(179, 235, 242, 0.95);
        border: 1px solid rgba(64, 109, 115, 0.25);
        color: #2a4d52;
        align-self: flex-end;
      }
      .messages-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .input-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }
      .input-bar .grow {
        flex: 1 1 220px;
        min-width: 180px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.4.0/dist/vuetify.min.js"></script>

    <script>
      const { createApp } = Vue;
      const { createVuetify } = Vuetify;

      const vuetify = createVuetify({
        theme: {
          defaultTheme: 'chatPastel',
          themes: {
            chatPastel: {
              dark: false,
              colors: {
                primary: '#B3EBF2',
                secondary: '#B2C5C8',
                accent: '#406D73',
                background: '#e4f6f9',
                surface: '#f7fcfd',
                'on-primary': '#2a4d52',
                'on-secondary': '#2f4a4f',
                'on-surface': '#2f4a4f',
              },
            },
          },
        },
      });

      createApp({
        data() {
          return {
            busqueda: '',
            pestañaLista: 'canales',
            yo: { nombre: 'Tu nombre', iniciales: 'TN' },
            destinatario: { nombre: 'Nombre del usuario con el que estás hablando', iniciales: 'US' },
            contactos: [
              { nombre: 'Ana López', detalle: 'Equipo ventas', iniciales: 'AL' },
              { nombre: 'Carlos Ruiz', detalle: 'Soporte', iniciales: 'CR' },
              { nombre: 'Equipo RR.HH.', detalle: 'Canal interno', iniciales: 'RH' },
              { nombre: 'María Fernández', detalle: 'En línea', iniciales: 'MF' },
            ],
            mensajes: [
              { mio: false, texto: 'Buenos días, ¿tienes un momento para revisar el aviso?' },
              { mio: true, texto: 'Sí, en10 minutos lo veo y te escribo.' },
              { mio: false, texto: 'Perfecto, gracias.' },
            ],
            textoMensaje: '',
          };
        },
        methods: {
          enviar() {
            const t = (this.textoMensaje || '').trim();
            if (!t) return;
            this.mensajes.push({ mio: true, texto: t });
            this.textoMensaje = '';
            this.$nextTick(() => {
              const el = this.$refs.areaMensajes;
              if (el) el.scrollTop = el.scrollHeight;
            });
          },
          adjuntar() {
            alert('Aquí iría la selección de archivos adjuntos (demo).');
          },
        },
        template: `
          <v-app>
            <v-main class="bg-background">
              <v-container fluid class="py-6 px-4">
                <v-sheet class="chat-shell bg-surface" elevation="0">
                  <v-row no-gutters class="flex-nowrap" style="min-height: 520px;">
                    <!-- Columna izquierda: lista / sidebar (~1/3 en md+) -->
                    <v-col cols="12" md="4" class="border-e border-opacity-25" style="border-color: rgb(var(--v-theme-accent)) !important;">
                      <div class="pa-3 pb-2">
                        <v-toolbar density="compact" color="primary" flat rounded="lg" class="px-2">
                          <v-avatar color="accent" size="36" class="text-white text-caption">
                            {{ yo.iniciales }}
                          </v-avatar>
                          <v-toolbar-title class="heading-14 ms-2 text-truncate">
                            {{ yo.nombre }}
                          </v-toolbar-title>
                          <v-spacer />
                          <v-text-field
                            v-model="busqueda"
                            density="compact"
                            variant="solo-filled"
                            flat
                            hide-details
                            placeholder="Buscar contactos"
                            prepend-inner-icon="mdi-magnify"
                            class="ms-2"
                            style="max-width: 140px;"
                            bg-color="rgba(255,255,255,0.55)"
                          />
                        </v-toolbar>

                        <v-btn-toggle
                          v-model="pestañaLista"
                          mandatory
                          divided
                          color="accent"
                          variant="outlined"
                          class="mt-3 w-100"
                          density="comfortable"
                        >
                          <v-btn value="canales" class="flex-grow-1 text-caption">
                            Ver canales de aviso
                          </v-btn>
                          <v-btn value="tareas" class="flex-grow-1 text-caption">
                            Lista de tareas
                          </v-btn>
                        </v-btn-toggle>
                      </div>

                      <v-divider opacity="0.2" color="accent" />

                      <v-list density="comfortable" lines="two" class="bg-transparent py-2">
                        <v-list-subheader class="heading-14 text-uppercase" style="opacity: 0.85;">
                          Lista de usuario y miembros para hablar
                        </v-list-subheader>
                        <v-list-item
                          v-for="(c, i) in contactos"
                          :key="i"
                          rounded="lg"
                          class="mx-2 mb-1"
                          :active="i === 0"
                          color="accent"
                        >
                          <template #prepend>
                            <v-avatar :color="i % 2 === 0 ? 'secondary' : 'primary'" size="40" class="text-caption">
                              {{ c.iniciales }}
                            </v-avatar>
                          </template>
                          <v-list-item-title class="font-weight-medium">{{ c.nombre }}</v-list-item-title>
                          <v-list-item-subtitle>{{ c.detalle }}</v-list-item-subtitle>
                        </v-list-item>
                      </v-list>
                    </v-col>

                    <!-- Columna derecha: chat (~2/3 en md+) -->
                    <v-col cols="12" md="8" class="d-flex flex-column">
                      <div class="pa-3 pb-2">
                        <v-toolbar density="compact" color="primary" flat rounded="lg" class="px-2">
                          <v-avatar color="secondary" size="36" class="text-medium-emphasis text-caption">
                            {{ destinatario.iniciales }}
                          </v-avatar>
                          <v-toolbar-title class="heading-14 ms-3">
                            {{ destinatario.nombre }}
                          </v-toolbar-title>
                        </v-toolbar>
                      </div>

                      <v-divider opacity="0.2" color="accent" />

                      <div ref="areaMensajes" class="messages-scroll flex-grow-1 pa-4 messages-stack">
                        <div
                          v-for="(m, j) in mensajes"
                          :key="j"
                          class="bubble"
                          :class="m.mio ? 'bubble-me' : 'bubble-them'"
                        >
                          {{ m.texto }}
                        </div>
                      </div>

                      <v-divider opacity="0.2" color="accent" />

                      <div class="pa-3 bg-surface">
                        <div class="input-bar">
                          <v-btn
                            class="btn-11"
                            color="accent"
                            variant="tonal"
                            prepend-icon="mdi-paperclip"
                            @click="adjuntar"
                          >
                            Archivos adjunto
                          </v-btn>
                          <v-text-field
                            v-model="textoMensaje"
                            density="comfortable"
                            variant="outlined"
                            hide-details
                            placeholder="Barra de escribir mensajes"
                            color="accent"
                            bg-color="secondary"
                            class="rounded-lg grow"
                            @keyup.enter="enviar"
                          />
                          <v-btn
                            class="btn-11"
                            color="accent"
                            variant="flat"
                            prepend-icon="mdi-send"
                            @click="enviar"
                          >
                            Enviar mensaje
                          </v-btn>
                        </div>
                      </div>
                    </v-col>
                  </v-row>
                </v-sheet>
              </v-container>
            </v-main>
          </v-app>
        `,
      })
        .use(vuetify)
        .mount('#app');
    </script>
  </body>
</html>
