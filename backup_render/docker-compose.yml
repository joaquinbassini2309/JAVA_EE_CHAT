version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - chat-net

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/chatdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 8080
    depends_on:
      - db
    networks:
      - chat-net

networks:
  chat-net:
    driver: bridge
