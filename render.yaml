services:
  - type: static
    name: chat-frontend
    env: node
    region: oregon
    branch: main
    buildCommand: "cd CapaPresentacion/Web && npm install && npm run build"
    publishCommand: ""
    staticPublishPath: "CapaPresentacion/Web/dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://<RENDER_BACKEND_URL>"
      - key: VITE_WS_BASE_URL
        value: "wss://<RENDER_BACKEND_URL>"

  - type: web_service
    name: chat-backend
    env: docker
    region: oregon
    branch: main
    dockerfilePath: CapaServicio/Dockerfile
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
    plan: free

