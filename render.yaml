services:
  - type: web_service
    name: chat-app
    env: docker
    region: oregon
    branch: main
    dockerfilePath: CapaServicio/Dockerfile
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://java-ee-chat-backend.onrender.com,http://localhost:5173"
    plan: free

