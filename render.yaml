services:
  - type: static
    name: chat-frontend
    env: node
    region: oregon
    branch: main
    buildCommand: "cd CapaPresentacion/Web && npm install && npm run build"
    publishCommand: ""
    staticPublishPath: "CapaPresentacion/Web/dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: "/chat-empresarial/api/v1"
      - key: VITE_WS_BASE_URL
        value: ""
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web_service
    name: chat-backend
    env: docker
    region: oregon
    branch: main
    dockerfilePath: CapaServicio/Dockerfile
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
    plan: free

